# Cloudflare Pages – Settings → Builds:
#
#   A) Anbefalt:
#      Build:  npm run cf:build
#      Deploy: npm run deploy        (IKKE "npx wrangler deploy" — det er Workers og feiler)
#
#   B) Hvis du ikke får endret Deploy-feltet: bygg + last opp i ett steg:
#      Build:  npm run cf:publish
#      Deploy: (tomt) eller bare:     true
#
#   "npm run build" alene = kun next build — brukes av vercel inni cf:build; sett aldri som ytterste CF-build.
#
name = "elchef-pages"
compatibility_date = "2024-11-12"
pages_build_output_dir = ".vercel/output/static"

# Enable Node.js built-in module compatibility for Workers runtime
compatibility_flags = ["nodejs_compat"]

## [pages] table is not supported by this runner; using pages_build_output_dir instead

# Environment variables are managed in Cloudflare Pages UI (Production + Preview).
# Remove this comment if you later re-introduce a [vars] block.

# Note: Pages config does not support account_id, triggers, or build/observability blocks


